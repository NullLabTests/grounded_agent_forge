name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check agent_forge/ dashboard/ --ignore=E501,F821 --statistics
      - run: ruff check . --ignore=E501,F821,E701,E402,E741 --statistics

  imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install openai sqlalchemy fastapi uvicorn httpx rich python-dotenv
      - name: Check forge modules parse
        run: for mod in agent_forge; do echo "=== $mod ==="; python -c "import $mod; print('OK')"; done
      - name: Check dashboard parses
        run: python3 -c $'import ast\nwith open("dashboard/main.py") as f:\n    ast.parse(f.read())\nprint("dashboard/main.py: syntax OK")'
      - name: Check all modules parse (no-exec)
        run: python3 -c $'import ast, os\nscripts = ["run_forge_loop.sh"]\nfor f in os.listdir("."):\n    if f.endswith(".py"):\n        scripts.append(f)\nfor script in scripts:\n    if not os.path.isfile(script):\n        continue\n    try:\n        with open(script) as f:\n            ast.parse(f.read())\n        print(f"{script}: syntax OK")\n    except SyntaxError as e:\n        print(f"{script}: FAILED - {e}")\n        raise'

  experiment_design:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate benchmarks/tasks.json
        run: python3 -c $'import json\nwith open("benchmarks/tasks.json") as f:\n    tasks = json.load(f)\nassert len(tasks) >= 3\nfor t in tasks:\n    assert "name" in t\n    assert "hidden_test_files" in t\n    assert len(t["hidden_test_files"]) >= 1\nprint(f"{len(tasks)} benchmarks OK")'
