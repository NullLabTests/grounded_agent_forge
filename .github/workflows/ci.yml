name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check agent_forge/ dashboard/ --ignore=E501,F821 --statistics
      - run: ruff check . --ignore=E501,F821,E701,E402,E741 --statistics

  imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install openai sqlalchemy fastapi uvicorn httpx rich python-dotenv
      - name: Check forge modules parse
        run: |
          for mod in agent_forge; do
            echo "=== $mod ==="
            python -c "import $mod; print('OK')"
          done
      - name: Check dashboard parses
        run: python -c "
import ast
with open('dashboard/main.py') as f:
    ast.parse(f.read())
print('dashboard/main.py: syntax OK')
"
      - name: Check all modules parse (no-exec)
        run: python -c "
import ast, os
scripts = ['run_forge_loop.sh']
for f in os.listdir('.'):
    if f.endswith('.py'):
        scripts.append(f)
for script in scripts:
    if not os.path.isfile(script):
        continue
    try:
        with open(script) as f:
            ast.parse(f.read())
        print(f'{script}: syntax OK')
    except SyntaxError as e:
        print(f'{script}: FAILED - {e}')
        raise
"

  experiment_design:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate benchmarks/tasks.json
        run: python3 -c "
import json
with open('benchmarks/tasks.json') as f:
    tasks = json.load(f)
assert len(tasks) >= 3
for t in tasks:
    assert 'name' in t
    assert 'hidden_test_files' in t
    assert len(t['hidden_test_files']) >= 1
print(f'{len(tasks)} benchmarks OK')
"
