name: Generate Score Badge

on:
  push:
    branches: [main]
    paths:
      - 'forge_population.db'

jobs:
  generate-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract best score
        id: extract-score
        run: |
          echo "score=active" >> $GITHUB_OUTPUT

      - name: Create badge JSON
        run: |
          echo '{"schemaVersion": 1, "label": "Status", "message": "evolving", "color": "green"}' > badge.json

      - name: Upload badge
        uses: actions/upload-artifact@v4
        with:
          name: status-badge
          path: badge.json
